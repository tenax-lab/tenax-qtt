name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Checkout tenax
        uses: actions/checkout@v5
        with:
          repository: tenax-lab/tenax
          path: tenax

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ./tenax -e ".[dev]" pytest pytest-cov ruff mypy scipy

      - name: Run linter
        run: |
          uv run ruff check src/ tests/ --select E,F,UP
          uv run ruff format --check src/ tests/

      - name: Run core tests
        env:
          JAX_PLATFORMS: cpu
        run: |
          uv run pytest tests/ -m "core" \
            --cov=tenax_qtt \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

  test-full:
    name: Full tests (Python ${{ matrix.python-version }})
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-tests')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Checkout tenax
        uses: actions/checkout@v5
        with:
          repository: tenax-lab/tenax
          path: tenax

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ./tenax -e ".[dev]" pytest pytest-cov ruff mypy scipy

      - name: Run all tests
        env:
          JAX_PLATFORMS: cpu
        run: |
          uv run pytest tests/ \
            --cov=tenax_qtt \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

  test-macos:
    name: Tests (macOS, Python 3.12)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Checkout tenax
        uses: actions/checkout@v5
        with:
          repository: tenax-lab/tenax
          path: tenax

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ./tenax -e ".[dev]" pytest pytest-cov ruff mypy scipy

      - name: Run core tests
        env:
          JAX_PLATFORMS: cpu
        run: |
          uv run pytest tests/ -m "core" \
            --cov=tenax_qtt \
            --cov-report=term-missing \
            -v

  test-full-macos:
    name: Full tests (macOS, Python 3.12)
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'run-full-tests')
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Checkout tenax
        uses: actions/checkout@v5
        with:
          repository: tenax-lab/tenax
          path: tenax

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ./tenax -e ".[dev]" pytest pytest-cov ruff mypy scipy

      - name: Run all tests
        env:
          JAX_PLATFORMS: cpu
        run: |
          uv run pytest tests/ \
            --cov=tenax_qtt \
            --cov-report=term-missing \
            -v
